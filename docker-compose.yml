

services:
  backend:
    build: ./backend
    container_name: task-manager-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/taskmanager
      - JWT_SECRET=mysecretkey
      - JWT_EXPIRES_IN=30d
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: task-manager-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:3000
    depends_on:
      - backend

  mongo:
    image: mongo:6
    container_name: task-manager-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: